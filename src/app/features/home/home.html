<div class="game-row">
    <aside>
      <p>Arcade Space Game</p>
      <button type="button" (click)="initGame()">Start Game</button>
      <button type="button" (click)="stopTick()">Stop Game</button>
      <button type="button" (click)="startTick()">Resume Game</button>
      <button type="button" (click)="backToStart()">Back To Start</button>
    </aside>
    <div class="space-canvas">
      <!-- tabindex="0" um das Canvas fokussierbar zu machen -->
      <canvas #spaceCanvas tabindex="0"></canvas>
      @if ( showStageIntro ) {
        <div class="stage-intro-overlay">
          <p class="stage-intro-text">{{ introText }}</p>
          <p class="stage-intro-info">Get ready Player!</p>
        </div>
      }
    </div>
</div>
